name: Generate ADsP Post

"on":
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube URL (DataEdu ADsP 1과목)"
        required: true
        type: string
      publish:
        description: "Publish to _posts immediately"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg (for Whisper fallback)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate draft/post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_SUMMARY_MODEL: ${{ vars.OPENAI_SUMMARY_MODEL || 'gpt-5-mini' }}
          OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL || 'gpt-image-1' }}
          WHISPER_MODEL: ${{ vars.WHISPER_MODEL || 'whisper-1' }}
        run: |
          python scripts/generate_post.py \
            --youtube-url "${{ inputs.youtube_url }}" \
            --publish "${{ inputs.publish }}"

      - name: Fail when no changes
        id: git-check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push (publish=true)
        if: steps.git-check.outputs.changed == 'true' && inputs.publish == true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts _drafts assets/images
          git commit -m "chore: publish ADsP post from ${{ inputs.youtube_url }}"
          git push

      - name: Create pull request (publish=false)
        if: steps.git-check.outputs.changed == 'true' && inputs.publish == false
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: generate ADsP draft from ${{ inputs.youtube_url }}"
          title: "draft: ADsP post from workflow"
          body: |
            This PR contains an AI-generated ADsP draft post and image.
            - Source URL: `${{ inputs.youtube_url }}`
            - Generated by workflow_dispatch
          branch: "drafts/${{ github.run_id }}"
          delete-branch: true

